<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estatísticas – AntennaMap Brasil</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='2' stroke='%230c9'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z'/%3E%3C/svg%3E"
    />

    <link rel="stylesheet" href="../shared.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <style>
      :root {
        --surface: #141414;
        --border: #2a2a2a;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #00cc99;
        --g5: #f04;
        --g4: #0c9;
        --g3: #fa0;
        --g2: #88f;
      }

      body {
        color: var(--text);
        min-height: 100dvh;
      }

      /* ── Stats-specific styles ────────────────────────────── */
      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.25rem;
      }

      .card .label {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.35rem;
      }

      .card .value {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1.2;
      }

      .card .sub {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.2rem;
      }

      section h2 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 1rem;
      }

      .charts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 1.5rem;
      }

      .chart-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.25rem;
      }

      .chart-box h3 {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 1rem;
      }

      .chart-box canvas {
        width: 100% !important;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      thead th {
        background: var(--surface);
        padding: 0.65rem 0.9rem;
        text-align: left;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
        border-bottom: 1px solid var(--border);
      }

      thead th:hover {
        color: var(--text);
      }
      thead th.sorted {
        color: var(--accent);
      }
      thead th .sort-icon {
        opacity: 0.5;
        margin-left: 3px;
      }
      thead th.sorted .sort-icon {
        opacity: 1;
      }

      tbody tr {
        border-bottom: 1px solid var(--border);
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      tbody td {
        padding: 0.6rem 0.9rem;
        white-space: nowrap;
      }

      td.city-name {
        font-weight: 500;
      }

      .badge-5g {
        display: inline-block;
        background: rgba(0, 204, 153, 0.15);
        color: var(--accent);
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 1px 5px;
        margin-left: 4px;
        vertical-align: middle;
      }

      .bar {
        display: inline-block;
        height: 8px;
        border-radius: 3px;
        vertical-align: middle;
      }

      .stack {
        display: flex;
        gap: 2px;
        width: 100%;
        min-width: 90px;
      }

      .stack span {
        height: 10px;
        border-radius: 2px;
        display: inline-block;
      }

      .num {
        text-align: right;
      }
      .hl {
        color: var(--accent);
        font-weight: 600;
      }

      .ranking {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      @media (max-width: 600px) {
        .ranking {
          grid-template-columns: 1fr;
        }
      }

      .rank-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.25rem;
      }

      .rank-box h3 {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .rank-box h3 svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .rank-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.3rem 0;
        font-size: 0.85rem;
        border-bottom: 1px solid var(--border);
      }

      .rank-item:last-child {
        border-bottom: none;
      }
      .rank-item .rank-val {
        color: var(--accent);
        font-weight: 600;
      }

      footer {
        text-align: center;
        padding: 2rem 1.25rem;
        font-size: 0.75rem;
        color: var(--muted);
        border-top: 1px solid var(--border);
      }

      #uf-select {
        padding: 3px 8px;
        border-radius: 4px;
        border: 1px solid #333;
        background: #222;
        color: #aaa;
        font-size: 0.75rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      #uf-select:hover {
        border-color: #555;
        color: #fff;
      }
      #uf-select:focus {
        outline: none;
        border-color: var(--accent);
        color: var(--accent);
      }

      .stats-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 3rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .stats-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #333;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <h1>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"

          >
            <path
              stroke-linecap="round"

        </h1>
        <nav class="header-nav">

            <svg

            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"
              />
            </svg>
            Mapa
          </a>
          <a class="tab active" href="../stats/">
            <svg
              xmlns="http://www.w3.org/2000/svg"

            >
              <path d="M12 14l9-5-9-5-9 5 9 5z" />
              <path
                d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"
              />
            </svg>
            Estatísticas
          </a>
          <a class="tab" href="../about/">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"

            >
              <path

                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
              />
            </svg>
            Sobre
          </a>
        </nav>
      </div>
      <div class="header-filters">
        <div class="filter-row">
          <span class="filter-label">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            Estado
          </span>
          <select id="uf-select">
            <option value="">Brasil (Nacional)</option>
          </select>
        </div>
        <div class="sep"></div>
        <div class="filter-row">
          <span class="filter-label">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"
              />
            </svg>
            Tecnologia
          </span>
          <div class="filter-group" id="tech-filter-group">
            <button class="filter-btn active" data-tech="Todos">Todos</button>
            <button class="filter-btn" data-tech="5G">5G</button>
            <button class="filter-btn" data-tech="4G">4G</button>
            <button class="filter-btn" data-tech="3G">3G</button>
            <button class="filter-btn" data-tech="2G">2G</button>
          </div>
        </div>
        <div class="sep"></div>
        <div class="filter-row">
          <span class="filter-label">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728m-9.9-2.829a5 5 0 010-7.07m7.072 0a5 5 0 010 7.07M13 12a1 1 0 11-2 0 1 1 0 012 0z"
              />
            </svg>
            Operadora
          </span>
          <div class="filter-group" id="op-filter-group">
            <button class="filter-btn active" data-op="">Todos</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="stats-loading">
        <div class="stats-spinner"></div>
        Carregando…
      </div>
    </main>

    <script>
      const ICON_RSS = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>`;
      const ICON_TROPHY = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16 4h2a2 2 0 012 2v1c0 2.97-2.143 5.449-5 5.91V15h2a1 1 0 010 2H7a1 1 0 010-2h2v-2.09C6.143 12.449 4 9.97 4 7V6a2 2 0 012-2h2m8 0V3a1 1 0 00-1-1H9a1 1 0 00-1 1v1m8 0H8"/></svg>`;
      const ICON_TREND_DOWN = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/></svg>`;
      const ICON_SIGNAL = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>`;
      const ICON_SPARK = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>`;

      const POP_THRESHOLD = 5000;
      const TECH_COLOR = {
        "5G": "#f04",
        "4G": "#0c9",
        "3G": "#fa0",
        "2G": "#88f",
      };
      const OP_COLOR = { Claro: "#e05c2a", TIM: "#0050a0", Vivo: "#660099" };
      const ALL_TECHS = ["5G", "4G", "3G", "2G"];
      const ALL_UFS = [
        "AC",
        "AL",
        "AM",
        "AP",
        "BA",
        "CE",
        "DF",
        "ES",
        "GO",
        "MA",
        "MG",
        "MS",
        "MT",
        "PA",
        "PB",
        "PE",
        "PI",
        "PR",
        "RJ",
        "RN",
        "RO",
        "RR",
        "RS",
        "SC",
        "SE",
        "SP",
        "TO",
      ];
      const UF_NAMES = {
        AC: "Acre",
        AL: "Alagoas",
        AM: "Amazonas",
        AP: "Amapá",
        BA: "Bahia",
        CE: "Ceará",
        DF: "Distrito Federal",
        ES: "Espírito Santo",
        GO: "Goiás",
        MA: "Maranhão",
        MG: "Minas Gerais",
        MS: "Mato Grosso do Sul",
        MT: "Mato Grosso",
        PA: "Pará",
        PB: "Paraíba",
        PE: "Pernambuco",
        PI: "Piauí",
        PR: "Paraná",
        RJ: "Rio de Janeiro",
        RN: "Rio Grande do Norte",
        RO: "Rondônia",
        RR: "Roraima",
        RS: "Rio Grande do Sul",
        SC: "Santa Catarina",
        SE: "Sergipe",
        SP: "São Paulo",
        TO: "Tocantins",
      };

      const fmt = (n) => n.toLocaleString("pt-BR");
      const fmtF = (n, d = 1) =>
        n.toLocaleString("pt-BR", {
          minimumFractionDigits: d,
          maximumFractionDigits: d,
        });

      function stackBar(counts, palette, total) {
        if (!total) return '<span style="color:var(--muted)">—</span>';
        return (
          '<div class="stack">' +
          Object.entries(counts)
            .sort((a, b) => b[1] - a[1])
            .map(([k, v]) => {
              const w = Math.max(1, Math.round((v / total) * 100));
              const c = palette[k] || "#555";
              return `<span style="width:${w}%;background:${c}" title="${k}: ${v}"></span>`;
            })
            .join("") +
          "</div>"
        );
      }

      // ── state ─────────────────────────────────────────────────────────────────
      let activeTech = localStorage.getItem("antennamap-tech") || "Todos";
      if (activeTech === "nova") activeTech = "Todos";
      let activeOp = localStorage.getItem("antennamap-op") || "";
      let activeUf = new URLSearchParams(location.search).get("uf") || "";
      let allRows = [];
      let chartPerCapita, chartTech;
      let sortCol = "per10k",
        sortDir = -1;
      let municipalitiesIndex = null;
      const stateDataCache = {};

      function saveFilters() {
        localStorage.setItem("antennamap-tech", activeTech);
        localStorage.setItem("antennamap-op", activeOp);
      }

      // ── UF selector ───────────────────────────────────────────────────────────
      const ufSelect = document.getElementById("uf-select");
      ALL_UFS.forEach((uf) => {
        const opt = document.createElement("option");
        opt.value = uf;
        opt.textContent = `${uf} – ${UF_NAMES[uf]}`;
        ufSelect.appendChild(opt);
      });
      if (activeUf) ufSelect.value = activeUf;

      ufSelect.addEventListener("change", async () => {
        activeUf = ufSelect.value;
        const url = new URL(location);
        if (activeUf) url.searchParams.set("uf", activeUf);
        else url.searchParams.delete("uf");
        history.replaceState(null, "", url);
        await loadScope();
      });

      // ── data loading ──────────────────────────────────────────────────────────
      async function loadMunicipalities() {
        if (municipalitiesIndex) return;
        municipalitiesIndex = await fetch("../data/municipalities.json").then(
          (r) => r.json(),
        );
      }

      async function loadStateAntennas(uf) {
        if (stateDataCache[uf]) return stateDataCache[uf];
        const data = await fetch(`../data/antennas/${uf}.json`).then((r) =>
          r.json(),
        );
        stateDataCache[uf] = data;
        return data;
      }

      async function loadScope() {
        const main = document.querySelector("main");
        const oldContent = main.innerHTML;
        main.innerHTML =
          '<div class="stats-loading"><div class="stats-spinner"></div>Carregando…</div>';

        try {
          await loadMunicipalities();

          if (!activeUf) {
            await renderNationalView();
          } else {
            const antData = await loadStateAntennas(activeUf);
            renderStateView(activeUf, antData);
          }
        } catch (err) {
          main.innerHTML = `<p style="color:#f85149;padding:2rem">Erro ao carregar dados: ${err.message}</p>`;
        }
      }

      // ── national view (from municipalities.json only) ─────────────────────────
      async function renderNationalView() {
        // Build per-state aggregates from municipalities index
        const stateAgg = {};
        for (const [, m] of Object.entries(municipalitiesIndex)) {
          const uf = m.uf;
          if (!stateAgg[uf])
            stateAgg[uf] = { pop: 0, antenas: 0, municipalities: 0 };
          stateAgg[uf].pop += m.populacao || 0;
          stateAgg[uf].antenas += m.antenas || 0;
          stateAgg[uf].municipalities++;
        }

        const totalPop = Object.values(stateAgg).reduce((s, a) => s + a.pop, 0);
        const totalAnt = Object.values(stateAgg).reduce(
          (s, a) => s + a.antenas,
          0,
        );
        const totalMun = Object.values(stateAgg).reduce(
          (s, a) => s + a.municipalities,
          0,
        );
        const globalPer = +((totalAnt / totalPop) * 10000).toFixed(2);

        allRows = ALL_UFS.filter((uf) => stateAgg[uf]).map((uf) => {
          const a = stateAgg[uf];
          return {
            city: UF_NAMES[uf],
            uf: uf,
            pop: a.pop,
            total: a.antenas,
            per10k: a.pop ? +((a.antenas / a.pop) * 10000).toFixed(1) : 0,
            municipalities: a.municipalities,
            techs: {},
            ops: {},
            has5g: false,
            new: 0,
            newPct: 0,
          };
        });

        // Hide tech/op filters for national view
        document
          .querySelector(".header-filters")
          .querySelectorAll(".sep")
          .forEach((s) => (s.style.display = ""));
        document
          .getElementById("tech-filter-group")
          ?.closest(".filter-row")
          ?.style.setProperty("display", "none");
        document
          .getElementById("op-filter-group")
          ?.closest(".filter-row")
          ?.style.setProperty("display", "none");

        document.querySelector("main").innerHTML = `
          <div class="cards" id="summary-cards"></div>
          <section>
            <h2>Antenas por estado</h2>
            <div class="charts">
              <div class="chart-box">
                <h3>Torres por 10 mil hab. — por estado</h3>
                <canvas id="chart-per-capita" height="500"></canvas>
              </div>
              <div class="chart-box">
                <h3>Total de antenas por estado</h3>
                <canvas id="chart-total" height="500"></canvas>
              </div>
            </div>
          </section>
          <section>
            <h2>Destaques</h2>
            <div class="ranking" id="ranking"></div>
          </section>
          <section>
            <h2>Tabela por estado</h2>
            <div class="table-wrap">
              <table id="main-table">
                <thead>
                  <tr>
                    <th data-col="city" data-type="str">Estado <span class="sort-icon">↕</span></th>
                    <th data-col="pop" data-type="num" class="num">População <span class="sort-icon">↕</span></th>
                    <th data-col="total" data-type="num" class="num">Torres <span class="sort-icon">↕</span></th>
                    <th data-col="per10k" data-type="num" class="num sorted">/ 10 mil hab. <span class="sort-icon">↓</span></th>
                    <th data-col="municipalities" data-type="num" class="num">Municípios <span class="sort-icon">↕</span></th>
                  </tr>
                </thead>
                <tbody id="table-body"></tbody>
              </table>
            </div>
          </section>
          <footer><p>Selecione um estado para ver estatísticas detalhadas por município.</p></footer>
        `;

        document.getElementById("summary-cards").innerHTML = [
          { label: "Estados", value: ALL_UFS.length, sub: "" },
          {
            label: "Municípios",
            value: fmt(totalMun),
            sub: "",
          },
          {
            label: "Torres",
            value: fmt(totalAnt),
            sub: "",
          },
          {
            label: "População total",
            value: fmt(totalPop),
            sub: "",
          },
          {
            label: "Torres / 10 mil hab.",
            value: fmtF(globalPer),
            sub: "Nacional",
          },
        ]
          .map(
            (c) => `<div class="card">
            <div class="label">${c.label}</div>
            <div class="value">${c.value}</div>
            ${c.sub ? `<div class="sub">${c.sub}</div>` : ""}
          </div>`,
          )
          .join("");

        // Charts
        const ordered = [...allRows].sort((a, b) => b.per10k - a.per10k);
        new Chart(document.getElementById("chart-per-capita"), {
          type: "bar",
          data: {
            labels: ordered.map((r) => r.uf),
            datasets: [
              {
                label: "Torres / 10 mil hab.",
                data: ordered.map((r) => r.per10k),
                backgroundColor: "rgba(0,204,153,.7)",
                borderRadius: 3,
              },
            ],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                grid: { color: "rgba(255,255,255,.05)" },
                ticks: { color: "#8b949e" },
              },
              y: {
                grid: { display: false },
                ticks: { color: "#e6edf3", font: { size: 11 } },
              },
            },
          },
        });

        const byTotal = [...allRows].sort((a, b) => b.total - a.total);
        new Chart(document.getElementById("chart-total"), {
          type: "bar",
          data: {
            labels: byTotal.map((r) => r.uf),
            datasets: [
              {
                label: "Total de antenas",
                data: byTotal.map((r) => r.total),
                backgroundColor: "rgba(59,130,246,.6)",
                borderRadius: 3,
              },
            ],
          },
          options: {
            indexAxis: "y",
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                grid: { color: "rgba(255,255,255,.05)" },
                ticks: { color: "#8b949e" },
              },
              y: {
                grid: { display: false },
                ticks: { color: "#e6edf3", font: { size: 11 } },
              },
            },
          },
        });

        // Rankings
        function rankBox(title, items, valFn) {
          return `<div class="rank-box"><h3>${title}</h3>${items
            .map(
              (r) =>
                `<div class="rank-item"><span>${r.city} (${r.uf})</span><span class="rank-val">${valFn(r)}</span></div>`,
            )
            .join("")}</div>`;
        }

        document.getElementById("ranking").innerHTML = [
          rankBox(
            `${ICON_TROPHY} Mais torres / 10 mil hab.`,
            ordered.slice(0, 5),
            (r) => fmtF(r.per10k),
          ),
          rankBox(
            `${ICON_TREND_DOWN} Menos torres / 10 mil hab.`,
            ordered.slice(-5).reverse(),
            (r) => fmtF(r.per10k),
          ),
          rankBox(
            `${ICON_SIGNAL} Mais torres (total)`,
            byTotal.slice(0, 5),
            (r) => fmt(r.total),
          ),
          rankBox(
            `${ICON_SPARK} Mais municípios`,
            [...allRows]
              .sort((a, b) => b.municipalities - a.municipalities)
              .slice(0, 5),
            (r) => fmt(r.municipalities),
          ),
        ].join("");

        // Table
        const maxPer10k = Math.max(...allRows.map((r) => r.per10k), 1);
        renderNationalTable(sortedRows(allRows), maxPer10k);
        wireTableSort(() => {
          renderNationalTable(
            sortedRows(allRows),
            Math.max(...allRows.map((r) => r.per10k), 1),
          );
        });
      }

      function renderNationalTable(data, maxPer10k) {
        document.getElementById("table-body").innerHTML = data
          .map(
            (r) => `
          <tr style="cursor:pointer" data-uf="${r.uf}">
            <td class="city-name">${r.city} <span style="color:var(--muted)">(${r.uf})</span></td>
            <td class="num">${fmt(r.pop)}</td>
            <td class="num hl">${fmt(r.total)}</td>
            <td class="num">
              <span class="bar" style="width:${Math.round((r.per10k / maxPer10k) * 60)}px;background:var(--accent);opacity:.75"></span>
              ${fmtF(r.per10k)}
            </td>
            <td class="num">${fmt(r.municipalities)}</td>
          </tr>`,
          )
          .join("");

        // Click row to drill down
        document.querySelectorAll("#table-body tr[data-uf]").forEach((tr) => {
          tr.addEventListener("click", () => {
            ufSelect.value = tr.dataset.uf;
            ufSelect.dispatchEvent(new Event("change"));
          });
        });
      }

      // ── state-level view (loads antenna data) ─────────────────────────────────
      function renderStateView(uf, antData) {
        const filtered = antData.filter((a) =>
          ALL_TECHS.includes(a.tecnologia),
        );

        // Show tech/op filters
        document
          .getElementById("tech-filter-group")
          ?.closest(".filter-row")
          ?.style.setProperty("display", "");
        document
          .getElementById("op-filter-group")
          ?.closest(".filter-row")
          ?.style.setProperty("display", "");

        // Build siteMaps per municipality
        const siteMaps = {};
        for (const a of filtered) {
          const c = a.municipio;
          if (!siteMaps[c]) siteMaps[c] = new Map();
          const key = `${a.lat.toFixed(3)},${a.lon.toFixed(3)}`;
          if (!siteMaps[c].has(key))
            siteMaps[c].set(key, {
              techs: new Set(),
              ops: new Set(),
              isNew: false,
            });
          const s = siteMaps[c].get(key);
          s.techs.add(a.tecnologia);
          s.ops.add(a.operadora);
          if (a.nova) s.isNew = true;
        }

        const rawCity = {};
        for (const a of filtered) {
          if (!rawCity[a.municipio])
            rawCity[a.municipio] = { techs: {}, ops: {} };
          rawCity[a.municipio].techs[a.tecnologia] =
            (rawCity[a.municipio].techs[a.tecnologia] || 0) + 1;
          rawCity[a.municipio].ops[a.operadora] =
            (rawCity[a.municipio].ops[a.operadora] || 0) + 1;
        }

        // Get municipalities for this state
        const stateMunicipalities = Object.entries(municipalitiesIndex).filter(
          ([, m]) => m.uf === uf,
        );

        allRows = stateMunicipalities.map(([, info]) => ({
          city: info.nome,
          pop: info.populacao || 0,
          techs: rawCity[info.nome]?.techs ?? {},
          ops: rawCity[info.nome]?.ops ?? {},
          _sites: siteMaps[info.nome] ? [...siteMaps[info.nome].values()] : [],
        }));

        // Populate operator buttons
        const ops = [...new Set(filtered.map((a) => a.operadora))].sort();
        const opGroup = document.getElementById("op-filter-group");
        // Reset op buttons
        opGroup.innerHTML =
          '<button class="filter-btn active" data-op="">Todos</button>';
        ops.forEach((op) => {
          const btn = document.createElement("button");
          btn.className = "filter-btn" + (op === activeOp ? " active" : "");
          btn.dataset.op = op;
          btn.textContent = op;
          opGroup.appendChild(btn);
        });
        if (activeOp) {
          opGroup.querySelector('[data-op=""]')?.classList.remove("active");
        }

        // Restore tech filter
        document
          .querySelectorAll("#tech-filter-group .filter-btn")
          .forEach((b) => {
            b.classList.toggle("active", b.dataset.tech === activeTech);
          });

        // Rebuild main content
        document.querySelector("main").innerHTML = `
          <div class="cards" id="summary-cards"></div>
          <section>
            <h2 id="section-heading">Torres por habitante</h2>
            <div class="charts">
              <div class="chart-box">
                <h3 id="chart-per-capita-title">Torres por 10 mil hab. — por município</h3>
                <canvas id="chart-per-capita" height="320"></canvas>
              </div>
              <div class="chart-box">
                <h3>Distribuição de tecnologia por município</h3>
                <canvas id="chart-tech" height="320"></canvas>
              </div>
            </div>
          </section>
          <section>
            <h2>Destaques</h2>
            <div class="ranking" id="ranking"></div>
          </section>
          <section>
            <h2>Tabela completa — ${UF_NAMES[uf]}</h2>
            <div class="table-wrap">
              <table id="main-table">
                <thead>
                  <tr>
                    <th data-col="city" data-type="str">Município <span class="sort-icon">↕</span></th>
                    <th data-col="pop" data-type="num" class="num">População <span class="sort-icon">↕</span></th>
                    <th data-col="total" data-type="num" class="num"><span id="th-towers">Torres</span> <span class="sort-icon">↕</span></th>
                    <th data-col="per10k" data-type="num" class="num sorted">/ 10 mil hab. <span class="sort-icon">↓</span></th>
                    <th data-col="newPct" data-type="num" class="num">Novas (%) <span class="sort-icon">↕</span></th>
                    <th>Operadoras</th>
                    <th>Tecnologias</th>
                  </tr>
                </thead>
                <tbody id="table-body"></tbody>
              </table>
            </div>
          </section>
          <footer><p>* Pop. &lt; 5 mil — per capita pode ser pouco representativo</p></footer>
        `;

        initStateCharts();
        applyStateFilter(activeTech, activeOp);

        // Wire filter buttons
        document
          .getElementById("tech-filter-group")
          .addEventListener("click", (e) => {
            const btn = e.target.closest(".filter-btn[data-tech]");
            if (!btn) return;
            document
              .querySelectorAll("#tech-filter-group .filter-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            activeTech = btn.dataset.tech;
            saveFilters();
            applyStateFilter(activeTech, activeOp);
          });

        document
          .getElementById("op-filter-group")
          .addEventListener("click", (e) => {
            const btn = e.target.closest(".filter-btn[data-op]");
            if (!btn) return;
            document
              .querySelectorAll("#op-filter-group .filter-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            activeOp = btn.dataset.op;
            saveFilters();
            applyStateFilter(activeTech, activeOp);
          });

        wireTableSort(() => {
          const rows = deriveStateRows(activeTech, activeOp);
          renderStateTable(
            sortedRows(rows),
            Math.max(...rows.map((r) => r.per10k), 1),
            activeTech === "Todos"
              ? "var(--accent)"
              : (TECH_COLOR[activeTech] ?? "var(--accent)"),
          );
        });
      }

      function deriveStateRows(tech, op) {
        return allRows.map((r) => {
          let total = 0,
            newCount = 0;
          for (const s of r._sites) {
            const techOk = tech === "Todos" ? true : s.techs.has(tech);
            const opOk = !op || s.ops.has(op);
            if (techOk && opOk) {
              total++;
              if (s.isNew) newCount++;
            }
          }
          const per10k = r.pop ? +((total / r.pop) * 10000).toFixed(1) : 0;
          const newPct = total ? +((newCount / total) * 100).toFixed(1) : 0;
          const has5g = r._sites.some((s) => s.techs.has("5G"));
          return { ...r, total, new: newCount, per10k, newPct, has5g };
        });
      }

      function applyStateFilter(tech, op) {
        const label = tech === "Todos" ? "Todas as gerações" : tech;
        const techColor = TECH_COLOR[tech] ?? "var(--muted)";

        const el = document.getElementById("chart-per-capita-title");
        if (el)
          el.textContent = `Torres ${label} por 10 mil hab. — por município`;
        const thEl = document.getElementById("th-towers");
        if (thEl)
          thEl.textContent = `Torres ${tech === "Todos" ? "" : tech}`.trim();

        const rows = deriveStateRows(tech, op);
        const totalPop = allRows.reduce((s, r) => s + r.pop, 0);
        const totalTowers = rows.reduce((s, r) => s + r.total, 0);
        const totalNew = rows.reduce((s, r) => s + r.new, 0);
        const globalPer = totalPop
          ? +((totalTowers / totalPop) * 10000).toFixed(2)
          : 0;
        const cities5g = rows.filter((r) => r.has5g).length;
        const operators = [
          ...new Set(allRows.flatMap((r) => Object.keys(r.ops))),
        ];

        const towerLabel =
          tech === "Todos" ? "Torres (todas)" : `Torres ${tech}`;
        document.getElementById("summary-cards").innerHTML = [
          {
            label: "Municípios",
            value: rows.length,
            sub: `${cities5g} com 5G`,
          },
          {
            label: towerLabel,
            value: fmt(totalTowers),
            sub: `${fmt(totalNew)} novas (≤1 ano)`,
          },
          {
            label: "População total",
            value: fmt(totalPop),
            sub: "",
          },
          { label: "Torres / 10 mil hab.", value: fmtF(globalPer), sub: label },
          {
            label: "Operadoras",
            value: operators.length,
            sub: operators.join(", "),
          },
        ]
          .map(
            (c) => `<div class="card">
            <div class="label">${c.label}</div>
            <div class="value">${c.value}</div>
            <div class="sub">${c.sub}</div>
          </div>`,
          )
          .join("");

        const maxPer10k = Math.max(...rows.map((r) => r.per10k), 1);
        const barColor =
          tech === "Todos"
            ? "var(--accent)"
            : (TECH_COLOR[tech] ?? "var(--accent)");
        renderStateTable(sortedRows(rows), maxPer10k, barColor);

        // Update charts (top 20 only)
        const TOP_N = 20;
        const ordered = [...rows].sort((a, b) => b.per10k - a.per10k);
        const top = ordered.slice(0, TOP_N);
        if (chartPerCapita) {
          chartPerCapita.data.labels = top.map((r) =>
            r.pop < POP_THRESHOLD ? r.city + " *" : r.city,
          );
          chartPerCapita.data.datasets[0].label = `Torres ${label} / 10 mil hab.`;
          chartPerCapita.data.datasets[0].data = top.map((r) => r.per10k);
          chartPerCapita.data.datasets[0].backgroundColor =
            tech === "Todos"
              ? top.map((r) =>
                  r.pop < POP_THRESHOLD
                    ? "rgba(255,255,255,.18)"
                    : r.has5g
                      ? "rgba(0,204,153,.75)"
                      : "rgba(59,130,246,.6)",
                )
              : top.map((r) =>
                  r.pop < POP_THRESHOLD
                    ? "rgba(255,255,255,.18)"
                    : techColor + "bf",
                );
          chartPerCapita.update();
        }

        if (chartTech) {
          const byTotal = [...rows]
            .sort((a, b) => {
              const ta = Object.values(a.techs).reduce((s, v) => s + v, 0);
              const tb = Object.values(b.techs).reduce((s, v) => s + v, 0);
              return tb - ta;
            })
            .slice(0, TOP_N);
          chartTech.data.labels = byTotal.map((r) => r.city);
          ALL_TECHS.forEach((t, i) => {
            chartTech.data.datasets[i].data = byTotal.map(
              (r) => r.techs[t] || 0,
            );
          });
          chartTech.update();
        }

        // Rankings
        const byPer10k = [...rows]
          .filter((r) => r.total > 0)
          .sort((a, b) => b.per10k - a.per10k);
        const byNew = [...rows]
          .filter((r) => r.new > 0)
          .sort((a, b) => b.newPct - a.newPct)
          .slice(0, 5);
        const by5g = [...allRows]
          .map((r) => ({
            ...r,
            v5g: r._sites.filter((s) => s.techs.has("5G")).length,
          }))
          .sort((a, b) => b.v5g - a.v5g)
          .slice(0, 5);

        function rankBox(title, items, valFn) {
          return `<div class="rank-box"><h3>${title}</h3>${items
            .map(
              (r) =>
                `<div class="rank-item"><span>${r.city}${r.pop < POP_THRESHOLD ? ' <span style="color:var(--muted);font-size:.7rem">*</span>' : ""}</span><span class="rank-val">${valFn(r)}</span></div>`,
            )
            .join("")}</div>`;
        }

        document.getElementById("ranking").innerHTML = [
          rankBox(
            `${ICON_TROPHY} Mais torres / 10 mil hab.`,
            byPer10k.slice(0, 5),
            (r) => fmtF(r.per10k),
          ),
          rankBox(
            `${ICON_TREND_DOWN} Menos torres / 10 mil hab.`,
            byPer10k.slice(-5).reverse(),
            (r) => fmtF(r.per10k),
          ),
          rankBox(
            `${ICON_SIGNAL} Mais torres 5G`,
            by5g,
            (r) => `${r.v5g} torres`,
          ),
          rankBox(
            `${ICON_SPARK} Mais novas (% do total)`,
            byNew,
            (r) => fmtF(r.newPct) + "%",
          ),
        ].join("");
      }

      function renderStateTable(data, maxPer10k, barColor) {
        document.getElementById("table-body").innerHTML = data
          .map(
            (r) => `
          <tr>
            <td class="city-name">${r.city}${r.has5g ? '<span class="badge-5g">5G</span>' : ""}${r.pop < POP_THRESHOLD ? ' <span style="color:var(--muted);font-size:.7rem" title="Pop. < ' + fmt(POP_THRESHOLD) + '">*</span>' : ""}</td>
            <td class="num">${fmt(r.pop)}</td>
            <td class="num hl">${r.total}</td>
            <td class="num">
              <span class="bar" style="width:${Math.round((r.per10k / maxPer10k) * 60)}px;background:${barColor};opacity:.75"></span>
              ${fmtF(r.per10k)}
            </td>
            <td class="num">${r.newPct > 0 ? fmtF(r.newPct) + "%" : "—"}</td>
            <td>${stackBar(
              r.ops,
              OP_COLOR,
              Object.values(r.ops).reduce((s, v) => s + v, 0),
            )}</td>
            <td>${stackBar(
              r.techs,
              TECH_COLOR,
              Object.values(r.techs).reduce((s, v) => s + v, 0),
            )}</td>
          </tr>`,
          )
          .join("");
      }

      // ── shared helpers ────────────────────────────────────────────────────────
      function sortedRows(rows) {
        return [...rows].sort((a, b) => {
          const av = a[sortCol],
            bv = b[sortCol];
          return typeof av === "string"
            ? sortDir * av.localeCompare(bv, "pt-BR")
            : sortDir * (av - bv);
        });
      }

      function wireTableSort(renderFn) {
        document.querySelectorAll("thead th[data-col]").forEach((th) => {
          th.addEventListener("click", () => {
            const col = th.dataset.col;
            if (sortCol === col) {
              sortDir *= -1;
            } else {
              sortCol = col;
              sortDir = col === "city" ? 1 : -1;
            }
            document.querySelectorAll("thead th").forEach((t) => {
              t.classList.remove("sorted");
              const ic = t.querySelector(".sort-icon");
              if (ic) ic.textContent = "↕";
            });
            th.classList.add("sorted");
            th.querySelector(".sort-icon").textContent =
              sortDir === -1 ? "↓" : "↑";
            renderFn();
          });
        });
      }

      function initStateCharts() {
        chartPerCapita = new Chart(
          document.getElementById("chart-per-capita"),
          {
            type: "bar",
            data: {
              labels: [],
              datasets: [
                { label: "", data: [], backgroundColor: [], borderRadius: 3 },
              ],
            },
            options: {
              indexAxis: "y",
              responsive: true,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  grid: { color: "rgba(255,255,255,.05)" },
                  ticks: { color: "#8b949e" },
                },
                y: {
                  grid: { display: false },
                  ticks: { color: "#e6edf3", font: { size: 11 } },
                },
              },
            },
          },
        );

        const initRows = deriveStateRows("Todos", "");
        const ordered = [...initRows]
          .sort((a, b) => {
            const ta = Object.values(a.techs).reduce((s, v) => s + v, 0);
            const tb = Object.values(b.techs).reduce((s, v) => s + v, 0);
            return tb - ta;
          })
          .slice(0, 20);
        chartTech = new Chart(document.getElementById("chart-tech"), {
          type: "bar",
          data: {
            labels: ordered.map((r) => r.city),
            datasets: ALL_TECHS.map((t) => ({
              label: t,
              data: ordered.map((r) => r.techs[t] || 0),
              backgroundColor: TECH_COLOR[t],
              borderRadius: 2,
            })),
          },
          options: {
            indexAxis: "y",
            responsive: true,
            plugins: {
              legend: {
                position: "top",
                labels: { color: "#8b949e", boxWidth: 12 },
              },
            },
            scales: {
              x: {
                stacked: true,
                grid: { color: "rgba(255,255,255,.05)" },
                ticks: { color: "#8b949e" },
              },
              y: {
                stacked: true,
                grid: { display: false },
                ticks: { color: "#e6edf3", font: { size: 11 } },
              },
            },
          },
        });
      }

      loadScope();
    </script>
  </body>
</html>
