name: update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run fetch.py
        working-directory: updater
      - run: ./compact.sh
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update antennas data"
