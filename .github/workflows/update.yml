name: update

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      uf:
        description: "States to fetch (space-separated, e.g. 'PR SP'). Empty = all."
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Clean existing data
        run: rm -f data/antennas/*.json data/population.json data/municipalities.json
      - name: Fetch ANATEL data
        working-directory: updater
        run: |
          if [ -n "${{ github.event.inputs.uf }}" ]; then
            uv run anatel.py --uf ${{ github.event.inputs.uf }}
          else
            uv run anatel.py
          fi
      - name: Fetch IBGE population data
        run: uv run ibge.py
        working-directory: updater
      - name: Build municipalities index
        run: uv run municipalities.py
        working-directory: updater
      - name: Install tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev zlib1g-dev
          git clone --depth=1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install
      - name: Generate PMTiles
        run: uv run pmtiles.py
        working-directory: updater
      - name: Upload PMTiles to R2
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          command: r2 object put temsinal-data/towers.pmtiles --file=data/towers.pmtiles
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Pull latest changes
        run: git pull --rebase
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: update antennas and population data"
