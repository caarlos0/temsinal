name: update

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      uf:
        description: "States to fetch (space-separated, e.g. 'PR SP'). Empty = all."
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Fetch ANATEL data
        working-directory: updater
        run: |
          if [ -n "${{ github.event.inputs.uf }}" ]; then
            uv run anatel.py --uf ${{ github.event.inputs.uf }}
          else
            uv run anatel.py --resume
          fi
      - name: Fetch IBGE population data
        run: uv run ibge.py
        working-directory: updater
      - name: Build municipalities index
        run: uv run municipalities.py
        working-directory: updater
      - name: Install tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev zlib1g-dev
          git clone --depth=1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install
      - name: Generate PMTiles
        run: uv run pmtiles.py
        working-directory: updater
      - run: ./compact.sh
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update antennas and population data"
