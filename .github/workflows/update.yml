name: update

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:
    inputs:
      uf:
        description: "States to fetch (space-separated, e.g. 'PR SP'). Empty = all."
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Fetch ANATEL data
        working-directory: updater
        run: |
          if [ -n "${{ github.event.inputs.uf }}" ]; then
            uv run anatel.py --uf ${{ github.event.inputs.uf }}
          else
            uv run anatel.py --resume
          fi
      - name: Fetch IBGE population data
        run: uv run ibge.py
        working-directory: updater
      - name: Build municipalities index
        run: uv run municipalities.py
        working-directory: updater
      - name: Install tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsqlite3-dev zlib1g-dev
          git clone --depth=1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install
      - name: Generate PMTiles
        run: uv run pmtiles.py
        working-directory: updater
      - name: Upload PMTiles to R2
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          command: r2 object put temsinal-data/towers.pmtiles --file=data/towers.pmtiles
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: ./compact.sh
      - uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          commit_message: "chore: update antennas and population data"
