<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobre – Conectividade Costa Oeste</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='2' stroke='%230c9'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z'/%3E%3C/svg%3E" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #00cc99;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px 4px;
      flex-wrap: wrap;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      text-decoration: none;
      border: none;
      border-bottom: 2px solid transparent;
      background: none;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .tab svg { width: 13px; height: 13px; flex-shrink: 0; }
    .tab:hover { color: #ccc; }
    .tab.active { color: #0c9; border-bottom-color: #0c9; }

    header h1 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 6px;
    }
    header h1 svg { width: 16px; height: 16px; flex-shrink: 0; }

    #about-content {
      max-width: 640px;
      margin: 4rem auto;
      padding: 2rem;
    }

    #about-content p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    #about-content a { color: var(--accent); text-decoration: none; }
    #about-content a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
      Conectividade Costa Oeste Paraná
    </h1>
    <nav class="header-nav">
      <button class="tab" onclick="location.href='../'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
        Mapa
      </button>
      <a href="../stats/" class="tab">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
        Estatísticas
      </a>
      <a href="../about/" class="tab active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
        Sobre
      </a>
    </nav>
  </div>
</header>

<div id="about-content">
  <p>Conceitualizado por <a href="https://caarlos0.dev" target="_blank" rel="noopener">Carlos A Becker</a> usando <a href="https://github.com/features/copilot" target="_blank" rel="noopener">GitHub Copilot</a>.</p>
  <p>Dados de antenas: <a href="https://sistemas.anatel.gov.br" target="_blank" rel="noopener">ANATEL</a></p>

  <p><a href="https://github.com/caarlos0/antennamap" target="_blank" rel="noopener">Código-fonte no GitHub</a></p>
</div>

</body>
</html>
